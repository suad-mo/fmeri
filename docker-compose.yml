services:

  # ─── MONGODB ───────────────────────────────────────────
  mongodb:
    ports:
      - "27017:27017"
    image: mongo:7
    container_name: nx-fmeri-db
    restart: unless-stopped
    env_file: .env.production
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: nx-fmeri
    volumes:
      - mongodb_data:/data/db
    networks:
      - fmeri-network

  # ─── API SERVER ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    container_name: nx-fmeri-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      - mongodb
    volumes:
      - ./docker-data/uploads:/app/uploads
      - api_assets:/app/assets
    networks:
      - fmeri-network

  # ─── WEB (Angular + Nginx) ─────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nx-fmeri-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - fmeri-network

volumes:
  mongodb_data:
  # api_uploads:
  api_assets:

networks:
  fmeri-network:
    driver: bridge
